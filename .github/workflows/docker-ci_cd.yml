name: CI/CD Pipeline - Social Media Clone

on:
  push:
    branches:
      - main

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ========================
      # 🧪 BACKEND TEST STAGE
      # ========================
      - name: Install Backend Dependencies
        run: |
          cd server
          npm install --legacy-peer-deps

      - name: Backend Lint Check (if available)
        run: |
          cd server
          npm run lint || echo "No lint script found - skipping"

      - name: Backend Test (if available)
        run: |
          cd server
          npm test || echo "No tests found - skipping"

      # ========================
      # 🧪 FRONTEND TEST STAGE
      # ========================
      - name: Install Frontend Dependencies
        run: |
          cd client
          npm install --legacy-peer-deps

      - name: Frontend Build Test
        run: |
          cd client
          npm run build

      # ========================
      # 🐳 DOCKER LOGIN
      # ========================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ========================
      # 🐳 BUILD IMAGES
      # ========================
      - name: Build Backend Image
        run: |
          docker build -t social_media_clone-backend ./server

      - name: Build Frontend Image
        run: |
          docker build -t social_media_clone-frontend ./client

      # ========================
      # 🏷 TAG IMAGES
      # ========================
      - name: Tag Backend Image
        run: |
          docker tag social_media_clone-backend ${{ secrets.DOCKER_USERNAME }}/social_media_clone-backend:latest

      - name: Tag Frontend Image
        run: |
          docker tag social_media_clone-frontend ${{ secrets.DOCKER_USERNAME }}/social_media_clone-frontend:latest

      # ========================
      # 🚀 PUSH TO DOCKER HUB
      # ========================
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/social_media_clone-backend:latest

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/social_media_clone-frontend:latest