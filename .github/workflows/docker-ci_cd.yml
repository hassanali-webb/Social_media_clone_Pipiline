name: CI/CD Pipeline - Social Media Clone

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Backend Image
      - name: Build Backend Image
        run: |
          docker build -t social_media_clone-backend ./server

      # Build Frontend Image
      - name: Build Frontend Image
        run: |
          docker build -t social_media_clone-frontend ./client

      # Tag Backend Image
      - name: Tag Backend Image
        run: |
          docker tag social_media_clone-backend ${{ secrets.DOCKER_USERNAME }}/social_media_clone-backend:latest

      # Tag Frontend Image
      - name: Tag Frontend Image
        run: |
          docker tag social_media_clone-frontend ${{ secrets.DOCKER_USERNAME }}/social_media_clone-frontend:latest

      # Push Backend Image
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/social_media_clone-backend:latest

      # Push Frontend Image
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/social_media_clone-frontend:latest